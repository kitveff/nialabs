<!-- ═══════════════════════════════════════════════════════════════════
     3-D ROBOT  —  Three.js r128, transparent canvas, no build step
═══════════════════════════════════════════════════════════════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function initRobot3D() {
  'use strict';
  if (typeof THREE === 'undefined') return;
  var canvas = document.getElementById('robot-canvas');
  if (!canvas) return;

  // ── Renderer ────────────────────────────────────────────────────────
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // ── Scene & Camera ──────────────────────────────────────────────────
  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 50);
  camera.position.set(0, 0.2, 6);
  camera.lookAt(0, 0.1, 0);

  // ── Resize ──────────────────────────────────────────────────────────
  function onResize() {
    var w = canvas.clientWidth  || 400;
    var h = canvas.clientHeight || 500;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  onResize();
  if (window.ResizeObserver) { new ResizeObserver(onResize).observe(canvas); }
  else { window.addEventListener('resize', onResize); }

  // ── Lights ──────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xd8e4ec, 0.72));

  var keyLight = new THREE.DirectionalLight(0xffffff, 1.3);
  keyLight.position.set(3, 6, 5);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(512, 512);
  scene.add(keyLight);

  var fillLight = new THREE.DirectionalLight(0x8ab4cc, 0.50);
  fillLight.position.set(-4, 2, 3);
  scene.add(fillLight);

  var rimLight = new THREE.PointLight(0x4080c0, 0.85, 14);
  rimLight.position.set(-3, 1, -2);
  scene.add(rimLight);

  var groundBounce = new THREE.PointLight(0x6080a0, 0.30, 10);
  groundBounce.position.set(0, -4, 1);
  scene.add(groundBounce);

  // ── Materials ────────────────────────────────────────────────────────
  // White/silver armor plates
  var wMat = new THREE.MeshPhysicalMaterial({
    color: 0xBECDD5, metalness: 0.28, roughness: 0.26,
    clearcoat: 0.88, clearcoatRoughness: 0.08,
  });
  // Dark joints and inner panels
  var dMat = new THREE.MeshPhysicalMaterial({
    color: 0x131B24, metalness: 0.62, roughness: 0.36,
    clearcoat: 0.22,
  });
  // Visor — near-black, mirror-like
  var vMat = new THREE.MeshPhysicalMaterial({
    color: 0x050C14, metalness: 0.94, roughness: 0.03,
    clearcoat: 1.0, clearcoatRoughness: 0.01,
  });
  // Blue accent elements
  var bMat = new THREE.MeshStandardMaterial({
    color: 0x1A5FAA, emissive: 0x0A2E55, emissiveIntensity: 0.60,
  });
  // Cyan emissive details
  var cyanMat = new THREE.MeshStandardMaterial({
    color: 0x00D4F0, emissive: 0x009DB8, emissiveIntensity: 2.0,
  });
  // Eye materials (pulse-animated)
  var mEyeL = new THREE.MeshStandardMaterial({ color: 0x00D8FF, emissive: 0x00A8CC, emissiveIntensity: 2.0 });
  var mEyeR = new THREE.MeshStandardMaterial({ color: 0x00D8FF, emissive: 0x00A8CC, emissiveIntensity: 2.0 });
  // Antenna tip materials (pulse-animated)
  var mTipL = new THREE.MeshStandardMaterial({ color: 0xC0CAD0, metalness: 0.75, roughness: 0.25, emissive: 0x506070, emissiveIntensity: 0.4 });
  var mTipR = new THREE.MeshStandardMaterial({ color: 0xC0CAD0, metalness: 0.75, roughness: 0.25, emissive: 0x506070, emissiveIntensity: 0.4 });

  // ── Geometry helpers ─────────────────────────────────────────────────
  function mkBox(w,h,d,m)     { var x=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); x.castShadow=true; return x; }
  function mkSph(r,m,s)       { var x=new THREE.Mesh(new THREE.SphereGeometry(r,s||24,s?Math.ceil(s*0.75):18),m); x.castShadow=true; return x; }
  function mkCyl(rT,rB,h,m,s) { var x=new THREE.Mesh(new THREE.CylinderGeometry(rT,rB,h,s||16),m); x.castShadow=true; return x; }
  function mkTor(r,t,m,s)     { return new THREE.Mesh(new THREE.TorusGeometry(r,t,10,s||24),m); }
  function at(o,x,y,z)        { o.position.set(x,y,z); return o; }

  // ── Robot root ───────────────────────────────────────────────────────
  var robot = new THREE.Group();
  robot.position.y = -0.4;
  scene.add(robot);

  // ── Body group ───────────────────────────────────────────────────────
  var bodyG = new THREE.Group();
  robot.add(bodyG);

  // -- Chest plates (two white armor panels) --
  var lcPlate = mkBox(0.30, 0.42, 0.22, wMat);
  lcPlate.position.set(-0.14, 0.18, 0.06);
  lcPlate.rotation.z =  0.05;
  bodyG.add(lcPlate);
  var rcPlate = mkBox(0.30, 0.42, 0.22, wMat);
  rcPlate.position.set( 0.14, 0.18, 0.06);
  rcPlate.rotation.z = -0.05;
  bodyG.add(rcPlate);

  // Center chest channel (dark)
  bodyG.add(at(mkBox(0.10, 0.42, 0.20, dMat), 0, 0.18, 0.02));
  // Blue center accent strip
  bodyG.add(at(mkBox(0.08, 0.36, 0.26, bMat), 0, 0.18, 0.11));

  // Abdomen (dark recessed section)
  bodyG.add(at(mkBox(0.44, 0.20, 0.20, dMat), 0, -0.10, 0.02));
  // Blue waist band
  bodyG.add(at(mkBox(0.42, 0.06, 0.24, bMat), 0, -0.02, 0.06));

  // Pelvis / hip block
  bodyG.add(at(mkBox(0.56, 0.24, 0.22, dMat), 0, -0.33, 0));

  // Neck
  bodyG.add(at(mkCyl(0.13, 0.16, 0.22, dMat, 20), 0, 0.52, 0));

  // -- Shoulder connectors --
  [-1, 1].forEach(function(s) {
    bodyG.add(at(mkBox(0.18, 0.18, 0.22, wMat), s * 0.46, 0.28, 0));
  });

  // -- Shoulder pauldrons (rounded armor caps) --
  [-1, 1].forEach(function(s) {
    var pad = mkSph(0.22, wMat, 28);
    pad.scale.set(1.12, 0.62, 0.90);
    pad.position.set(s * 0.62, 0.35, -0.02);
    bodyG.add(pad);
  });

  // ── Arms ─────────────────────────────────────────────────────────────
  var leftArmG  = new THREE.Group();
  var rightArmG = new THREE.Group();
  leftArmG.position.set( -0.70, 0.24, 0);
  rightArmG.position.set(  0.70, 0.24, 0);
  bodyG.add(leftArmG, rightArmG);

  [leftArmG, rightArmG].forEach(function(ag) {
    // Upper arm
    ag.add(at(mkCyl(0.11, 0.095, 0.42, wMat, 20), 0, -0.21, 0));
    // Elbow joint
    ag.add(at(mkSph(0.104, dMat, 16), 0, -0.44, 0.02));
    // Forearm
    ag.add(at(mkCyl(0.094, 0.076, 0.36, wMat, 20), 0, -0.63, 0.02));
    // Wrist joint
    ag.add(at(mkSph(0.080, dMat, 14), 0, -0.84, 0.02));
    // Hand
    ag.add(at(mkBox(0.13, 0.15, 0.09, wMat), 0, -0.945, 0.022));
  });

  // ── Legs ─────────────────────────────────────────────────────────────
  [-1, 1].forEach(function(s) {
    var py = -0.46;
    var lx = s * 0.17;
    // Thigh
    bodyG.add(at(mkCyl(0.114, 0.100, 0.34, wMat, 20), lx, py - 0.17, 0));
    // Knee
    bodyG.add(at(mkSph(0.108, dMat, 16), lx, py - 0.36, 0.03));
    // Lower leg
    bodyG.add(at(mkCyl(0.096, 0.080, 0.32, wMat, 20), lx, py - 0.53, 0.04));
    // Ankle
    bodyG.add(at(mkSph(0.080, dMat, 14), lx, py - 0.70, 0.04));
    // Foot
    bodyG.add(at(mkBox(0.18, 0.09, 0.28, wMat), lx, py - 0.77, 0.09));
  });

  // ── Head ─────────────────────────────────────────────────────────────
  var headG = new THREE.Group();
  headG.position.y = 1.30;
  robot.add(headG);

  // Helmet sphere (white/silver dome)
  var helmetSph = mkSph(0.52, wMat, 40);
  helmetSph.scale.y = 1.06;
  headG.add(helmetSph);

  // Top crest ridge
  var crest = mkBox(0.07, 0.18, 0.10, dMat);
  crest.position.set(0, 0.52, 0.16);
  headG.add(crest);

  // Visor recess frame (dark, spans full width)
  headG.add(at(mkBox(0.90, 0.24, 0.22, dMat), 0, 0.02, 0.38));

  // Visor glass (near-black mirror)
  headG.add(at(mkBox(0.76, 0.19, 0.10, vMat), 0, 0.02, 0.49));

  // Left eye glow strip (inside visor)
  var eyeL = mkBox(0.17, 0.044, 0.06, mEyeL);
  eyeL.position.set(-0.175, 0.02, 0.540);
  headG.add(eyeL);

  // Right eye glow strip
  var eyeR = mkBox(0.17, 0.044, 0.06, mEyeR);
  eyeR.position.set( 0.175, 0.02, 0.540);
  headG.add(eyeR);

  // Eye point lights
  var ePtL = new THREE.PointLight(0x00CCFF, 0.65, 1.2);
  ePtL.position.set(-0.175, 0.02, 0.80);
  var ePtR = new THREE.PointLight(0x00CCFF, 0.65, 1.2);
  ePtR.position.set( 0.175, 0.02, 0.80);
  headG.add(ePtL, ePtR);

  // Ear side panels
  [-1, 1].forEach(function(s) {
    var outer = mkCyl(0.11, 0.11, 0.08, wMat, 24);
    outer.rotation.z = Math.PI / 2;
    outer.position.set(s * 0.56, 0.0, 0.06);
    var inner = mkCyl(0.068, 0.068, 0.06, dMat, 24);
    inner.rotation.z = Math.PI / 2;
    inner.position.set(s * 0.62, 0.0, 0.06);
    headG.add(outer, inner);
  });

  // Blue side accent lines
  [-1, 1].forEach(function(s) {
    headG.add(at(mkBox(0.06, 0.07, 0.05, bMat), s * 0.32, -0.17, 0.44));
  });

  // ── Antennas ─────────────────────────────────────────────────────────
  var antennaGroups = [];
  [{x: -0.18, tilt: -0.20}, {x: 0.18, tilt: 0.20}].forEach(function(cfg, i) {
    var ag = new THREE.Group();
    ag.position.set(cfg.x, 0.52, 0.04);
    ag.rotation.z = cfg.tilt;
    headG.add(ag);

    ag.add(at(mkCyl(0.012, 0.018, 0.44, dMat, 8), 0, 0.22, 0));

    var tm = i === 0 ? mTipL : mTipR;
    ag.add(at(mkSph(0.036, tm, 10), 0, 0.46, 0));

    var tl = new THREE.PointLight(0x88AABB, 0.15, 0.5);
    tl.position.y = 0.46;
    ag.add(tl);

    antennaGroups.push({ group: ag, restZ: cfg.tilt });
  });

  // ── Mouse input ──────────────────────────────────────────────────────
  var isMob = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
  var mNX = 0, mNY = 0, headRX = 0, headRY = 0, lastMv = 0;

  if (!isMob) {
    document.addEventListener('mousemove', function(e) {
      mNX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mNY = (e.clientY / window.innerHeight - 0.5) * 2;
      lastMv = Date.now();
    });
  }

  // ── Animation ────────────────────────────────────────────────────────
  var clock = new THREE.Clock();
  function lerp(a, b, t) { return a + (b - a) * t; }

  function animate() {
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();

    // Float — gentle bob (amplitude 0.08, speed 1.2)
    robot.position.y = -0.4 + Math.sin(t * 1.2) * 0.08;

    // Idle sway — slow Y rotation ±15°
    robot.rotation.y = Math.sin(t * 0.6) * 0.262;

    // Head look — cursor tracking with lazy lerp (0.05), auto on mobile/idle
    var noInput = isMob || (Date.now() - lastMv > 2500);
    var autoH   = Math.sin(t * 0.45) * 0.30;
    headRX = noInput ? lerp(headRX, autoH, 0.03) : lerp(headRX, mNX * 0.45, 0.05);
    headRY = noInput ? lerp(headRY, 0,     0.03) : lerp(headRY, -mNY * 0.28, 0.05);
    headG.rotation.y = headRX;
    headG.rotation.x = headRY;

    // Arm swing — opposite phase ±10°
    var sw = Math.sin(t * 0.9) * 0.175;
    leftArmG.rotation.x  =  sw;
    rightArmG.rotation.x = -sw;

    // Eye pulse — emissiveIntensity 1.5 → 3.0
    var p = Math.sin(t * 2.5) * 0.5 + 0.5;
    mEyeL.emissiveIntensity = 1.5 + p * 1.5;
    mEyeR.emissiveIntensity = 1.5 + p * 1.5;
    ePtL.intensity = 0.35 + p * 0.65;
    ePtR.intensity = 0.35 + p * 0.65;

    // Antenna wobble — spring-like follow of head + individual oscillation
    var p2 = Math.sin(t * 3.2 + 1.0) * 0.5 + 0.5;
    mTipL.emissiveIntensity = 1.5 + p2 * 1.8;
    mTipR.emissiveIntensity = 1.5 + p2 * 1.8;
    antennaGroups.forEach(function(a, i) {
      var wobble = Math.sin(t * 3.5 + i * Math.PI) * 0.055;
      var follow = headRX * 0.22 * (i === 0 ? -1 : 1);
      a.group.rotation.z = a.restZ + wobble + follow;
    });

    renderer.render(scene, camera);
  }

  animate();
})();
</script>

</body>
</html>
